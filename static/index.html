    function renderNewProjectInput() {
      if (configWorkspaces.length > 0) {
        let wsOpts = '';
        for (const w of configWorkspaces) {
          wsOpts += '<option value="' + esc(w) + '">' + esc(w) + '</option>';
        }
        return '<div class="new-project-row">'
          + '<select id="wz-new-ws">' + wsOpts + '</select>'
          + '<span style="color:var(--dim)">/</span>'
          + '<input id="wz-new-name" placeholder="project-name">'
          + '</div>';
      }
      return '<div class="new-project-row">'
        + '<input id="wz-new-path" placeholder="/absolute/path/to/new/project" style="flex:1">'
        + '</div>';
    }

    function getNewProjectPath() {
      if (configWorkspaces.length > 0) {
        const ws = (document.getElementById('wz-new-ws') || {}).value || '';
        const name = (document.getElementById('wz-new-name') || {}).value || '';
        if (!ws || !name.trim()) return null;
        return ws.replace(/\/$/, '') + '/' + name.trim();
      }
      const path = (document.getElementById('wz-new-path') || {}).value || '';
      return path.trim() || null;
    }

    function onProjectChange() {
      const sel = document.getElementById('plan-project');
      const area = document.getElementById('new-project-area');
      if (sel && area) {
        area.innerHTML = sel.value === '__new__' ? renderNewProjectInput() : '';
      }
    }

    function renderOrchLaunchHtml() {
      const modeW = planMode === 'wizard' ? ' active' : '';
      const modeT = planMode === 'toml' ? ' active' : '';

      let html = '<div class="plan-launch">'
        + '<div class="plan-mode-tabs">'
        + '<button class="plan-mode-btn' + modeW + '" onclick="setPlanMode(\'wizard\')">Wizard</button>'
        + '<button class="plan-mode-btn' + modeT + '" onclick="setPlanMode(\'toml\')">TOML</button>'
        + '</div>';

      if (planMode === 'toml') {
        html += '<label>Project</label>'
          + '<select id="plan-project">' + projectOptions() + '</select>'
          + '<label>Plan TOML</label>'
          + '<textarea id="plan-toml-input" placeholder="[plan]\nname = &quot;my-plan&quot;\nbranch = &quot;feat/my-plan&quot;\n\n[[tasks]]\nname = &quot;task-1&quot;\nprompt = &quot;...&quot;"></textarea>'
          + '<button class="btn-launch" id="btn-launch" onclick="launchPlan()">Launch</button>'
          + '<div class="plan-error" id="plan-error"></div>';
      } else {
        html += renderWizardForm();
      }

      html += '</div>';
      return html;
    }

    function setPlanMode(mode) {
      // Save wizard state before switching
      if (planMode === 'wizard') saveWizardState();
      planMode = mode;
      renderOrchestration(true);
    }

    function saveWizardState() {
      // Save plan meta
      const wzName = document.getElementById('wz-name');
      if (wzName) {
        wizardPlan.name = wzName.value;
        wizardPlan.branch = (document.getElementById('wz-branch') || {}).value || '';
        wizardPlan.model = (document.getElementById('wz-model') || {}).value || '';
        wizardPlan.on_complete = (document.getElementById('wz-oncomplete') || {}).value || 'manual';
        wizardPlan.skip_permissions = (document.getElementById('wz-skip-perms') || {}).checked || false;
        wizardPlan.project = (document.getElementById('plan-project') || {}).value || '';
      }
      // Save tasks
      const tasks = [];
      let i = 0;
      while (true) {
        const nameEl = document.getElementById('wt-name-' + i);
        if (!nameEl) break;
        tasks.push({
          name: nameEl.value,
          prompt: (document.getElementById('wt-prompt-' + i) || {}).value || '',
          model: (document.getElementById('wt-model-' + i) || {}).value || '',
          depends_on: (document.getElementById('wt-deps-' + i) || {}).value || '',
          allowed_tools: (document.getElementById('wt-tools-' + i) || {}).value || '',
        });
        i++;
      }
      if (tasks.length) wizardTasks = tasks;
    }

    function renderWizardForm() {
      let html = '<div class="wizard-form">';

      // Plan meta
      const wp = wizardPlan;
      const ocSel = function(v) { return v === wp.on_complete ? ' selected' : ''; };
      html += '<div class="wizard-section-title">Plan</div>'
        + '<div class="field-row">'
        + '<div class="field-group"><label>Name</label><input id="wz-name" placeholder="my-plan" value="' + esc(wp.name) + '"></div>'
        + '<div class="field-group"><label>Branch</label><input id="wz-branch" placeholder="defaults to name" value="' + esc(wp.branch) + '"></div>'
        + '</div>'
        + '<div class="field-row">'
        + '<div class="field-group"><label>Model</label><input id="wz-model" placeholder="e.g. claude-sonnet-4-6" value="' + esc(wp.model) + '"></div>'
        + '<div class="field-group"><label>On complete</label>'
        + '<select id="wz-oncomplete"><option value="manual"' + ocSel('manual') + '>manual</option><option value="merge"' + ocSel('merge') + '>merge</option><option value="pr"' + ocSel('pr') + '>pr</option></select></div>'
        + '</div>'
        + '<div class="field-group"><label>Project</label><select id="plan-project" onchange="onProjectChange()">' + projectOptions(wp.project) + '</select></div>'

        + '<div class="wizard-toggle-row">'
        + '<input type="checkbox" id="wz-skip-perms"' + (wp.skip_permissions ? ' checked' : '') + '><label for="wz-skip-perms">Autonomous mode (skip permission prompts)</label>'
        + '</div>';

      // Tasks
      html += '<div class="wizard-section-title">Tasks</div>';
      for (let i = 0; i < wizardTasks.length; i++) {
        const t = wizardTasks[i];
        html += '<div class="wizard-task">'
          + '<div class="task-head">'
          + '<span class="task-num">#' + (i + 1) + '</span>'
          + '<input id="wt-name-' + i + '" placeholder="task-name" value="' + esc(t.name) + '">'
          + (wizardTasks.length > 1 ? '<button class="btn-remove-task" onclick="removeWizardTask(' + i + ')" title="Remove">\u00d7</button>' : '')
          + '</div>'
          + '<div class="field-group"><label>Prompt</label>'
          + '<textarea id="wt-prompt-' + i + '" placeholder="What should Claude do?">' + esc(t.prompt) + '</textarea></div>'
          + '<div class="field-row">'
          + '<div class="field-group"><label>Model</label><input id="wt-model-' + i + '" placeholder="inherit plan model" value="' + esc(t.model) + '"></div>'
          + '<div class="field-group"><label>Depends on</label><input id="wt-deps-' + i + '" placeholder="task-1, task-2" value="' + esc(t.depends_on) + '"></div>'
          + '</div>'
          + '<div class="field-group"><label>Allowed tools</label><input id="wt-tools-' + i + '" placeholder="e.g. Read,Grep,Edit" value="' + esc(t.allowed_tools) + '"></div>'
          + '</div>';
      }
      html += '<button class="btn-add-task" onclick="addWizardTask()">+ Add task</button>';

      // Launch
      html += '<button class="btn-launch" id="btn-launch" onclick="launchWizard()">Launch</button>'
        + '<div class="plan-error" id="plan-error"></div>';

      html += '</div>';
      return html;

    function addWizardTask() {
      saveWizardState();
      wizardTasks.push({ name: '', prompt: '', model: '', depends_on: '', allowed_tools: '' });
      renderOrchestration(true);
    }

    function removeWizardTask(idx) {
      saveWizardState();
      wizardTasks.splice(idx, 1);
      renderOrchestration(true);
    }

    function wizardToToml() {
      const name = (document.getElementById('wz-name') || {}).value || '';
      const branch = (document.getElementById('wz-branch') || {}).value || '';
      const model = (document.getElementById('wz-model') || {}).value || '';
      const onComplete = (document.getElementById('wz-oncomplete') || {}).value || 'manual';
      const skipPerms = (document.getElementById('wz-skip-perms') || {}).checked || false;

      if (!name.trim()) return { error: 'Plan name is required' };

      saveWizardState();
      const tasks = wizardTasks.filter(t => t.name.trim());
      if (!tasks.length) return { error: 'At least one task is required' };
      for (const t of tasks) {
        if (!t.prompt.trim()) return { error: 'Task "' + t.name + '" needs a prompt' };
      }

      let toml = '[plan]\n';
      toml += 'name = "' + name.trim() + '"\n';
      toml += 'branch = "' + (branch.trim() || name.trim()) + '"\n';
      if (model.trim()) toml += 'model = "' + model.trim() + '"\n';
      toml += 'on_complete = "' + onComplete + '"\n';
      if (skipPerms) toml += 'skip_permissions = true\n';

      for (const t of tasks) {
        toml += '\n[[tasks]]\n';
        toml += 'name = "' + t.name.trim() + '"\n';
        if (t.prompt.includes('\n')) {
          toml += "prompt = '''\n" + t.prompt + "\n'''\n";
        } else {
          toml += 'prompt = "' + t.prompt.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"\n';
        }
        if (t.model.trim()) toml += 'model = "' + t.model.trim() + '"\n';
        const deps = t.depends_on.split(',').map(d => d.trim()).filter(Boolean);
        if (deps.length) toml += 'depends_on = [' + deps.map(d => '"' + d + '"').join(', ') + ']\n';
        if (t.allowed_tools.trim()) toml += 'allowed_tools = "' + t.allowed_tools.trim() + '"\n';
      }

      return { toml };
    }

    async function launchWizard() {
      const errEl = document.getElementById('plan-error');
      const btn = document.getElementById('btn-launch');
      const result = wizardToToml();
      if (result.error) { errEl.textContent = result.error; return; }

      const projectSelect = document.getElementById('plan-project');
      btn.classList.add('loading');
      btn.textContent = 'Launching\u2026';
      errEl.textContent = '';

      const body = { plan_toml: result.toml };
      if (projectSelect && projectSelect.value === '__new__') {
        const newPath = getNewProjectPath();
        if (!newPath) { errEl.textContent = 'Enter a path for the new project'; btn.classList.remove('loading'); btn.textContent = 'Launch'; return; }
        body.project_root = newPath;
      } else if (projectSelect && projectSelect.value) {
        body.project_root = projectSelect.value;
      }

      try {
        const res = await apiFetch('/api/orchestrate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          orchestrationState = data.snapshot || data;
          orchPrUrl = null;
          orchDismissed = false;
          wizardTasks = [{ name: '', prompt: '', model: '', depends_on: '', allowed_tools: '' }];
          wizardPlan = { name: '', branch: '', model: '', on_complete: 'manual', skip_permissions: true, project: '' };
          renderOrchestration();
        } else {
          const rb = await res.json().catch(() => ({ error: res.statusText }));
          errEl.textContent = rb.error || rb.message || 'Launch failed (' + res.status + ')';
          btn.classList.remove('loading');
          btn.textContent = 'Launch';
        }
      } catch (e) {
        errEl.textContent = 'Network error: ' + e.message;
        btn.classList.remove('loading');
        btn.textContent = 'Launch';
      }
    }

    function renderOrchMonitorHtml(snapshotOverride, readOnly, relaunchData) {
      const s = snapshotOverride || orchestrationState;
      if (!s) return '<div class="empty">No orchestration data</div>';
      const stateCol = orchStateColor(s.state);
      const counts = s.counts || {};

      // Header bar
      let html = '<div class="plan-monitor">'
        + '<div class="plan-header-bar">'
        + '<span class="plan-name">' + esc(s.plan_name || 'Plan') + '</span>';
      if (s.branch) html += '<span class="plan-branch">' + esc(s.branch) + '</span>';
      html += '<span class="plan-state-badge" style="color:' + stateCol + ';border-color:' + stateCol + '">' + esc(s.state || '?') + '</span>'
        + '<span class="plan-elapsed">' + esc(fmtElapsed(s.elapsed_secs || 0)) + '</span>';

      // Counts
      const parts = [];
      if (counts.done != null)    parts.push('<span class="cnt-val">' + counts.done + '</span>/' + (s.tasks ? s.tasks.length : 0) + ' done');
      if (counts.running != null && counts.running > 0) parts.push('<span class="cnt-val">' + counts.running + '</span> running');
      if (counts.blocked != null && counts.blocked > 0) parts.push('<span class="cnt-val">' + counts.blocked + '</span> blocked');
      if (counts.failed != null && counts.failed > 0)   parts.push('<span class="cnt-val" style="color:var(--red)">' + counts.failed + '</span> failed');
      if (counts.pending != null && counts.pending > 0) parts.push('<span class="cnt-val">' + counts.pending + '</span> pending');
      if (parts.length) {
        html += '<span class="plan-counts">' + parts.join(' \u00b7 ') + '</span>';
      }
      html += '</div>';

      // Task list
      html += '<div class="task-list">';
      const tasks = s.tasks || [];
      if (tasks.length === 0) {
        html += '<div class="empty">No tasks</div>';
      } else {
        for (const t of tasks) {
          const isExpanded = expandedTasks.has(t.name);
          html += '<div class="task-card" data-id="' + esc(t.name) + '" onclick="toggleTask(\'' + esc(t.name) + '\')">'
            + '<div class="task-row">'
            + '<span class="task-status-icon ' + esc(t.status) + '">' + taskStatusIcon(t.status) + '</span>'
            + '<span class="task-name">' + esc(t.name) + '</span>';
          if (t.elapsed_secs != null) {
            html += '<span class="task-elapsed">' + esc(fmtElapsed(t.elapsed_secs)) + '</span>';
          }
          html += '</div>';

          // Dependencies
          if (t.depends_on && t.depends_on.length) {
            html += '<div class="task-deps">depends on: ' + t.depends_on.map(d => esc(d)).join(', ') + '</div>';
          }

          // Output (expandable)
          html += '<div class="task-output' + (isExpanded ? ' visible' : '') + '">';
          if (t.output_tail && t.output_tail.length) {
            html += '<pre>' + esc(t.output_tail.join('\n')) + '</pre>';
          } else if (isExpanded) {
            html += '<pre style="color:var(--muted)">No output yet</pre>';
          }
          if (t.exit_code != null) {
            const ecCls = t.exit_code === 0 ? 'success' : 'failure';
            html += '<div class="task-exit-code ' + ecCls + '">exit code: ' + t.exit_code + '</div>';
          }
          html += '</div></div>';
        }
      }
      html += '</div>';

      // Action bar (omit for read-only / historical views)
      html += '<div class="plan-actions">';
      if (!readOnly) {
        const st = s.state || '';
        if (st === 'running') {
          html += '<button class="btn-plan abort" onclick="orchAbort(this)">Abort</button>';
        }
        if (st === 'completed') {
          html += '<button class="btn-plan merge" onclick="orchMerge(this)">Merge</button>';
          html += '<button class="btn-plan pr" onclick="orchPr(this)">Create PR</button>';
        }
        if (st === 'failed' || st === 'aborted') {
          html += '<button class="btn-plan merge" onclick="orchRelaunch(this)">Relaunch</button>';
        }
        if (st === 'completed' || st === 'failed' || st === 'aborted') {
          html += '<button class="btn-plan newplan" onclick="orchReset()">New Plan</button>';
        }
        if (orchPrUrl) {
          html += '<span class="pr-url"><a href="' + esc(orchPrUrl) + '" target="_blank">' + esc(orchPrUrl) + '</a></span>';
        }
      }
      if (readOnly && relaunchData) {
        const st = relaunchData.state || '';
        if (st === 'failed' || st === 'aborted') {
          html += '<button class="btn-plan merge" onclick="relaunchFromHistory(\'' + esc(relaunchData.id) + '\', this)">Relaunch</button>';
        }
      }
      html += '</div>';

      html += '</div>';
      return html;
    }

    function toggleTask(name) {
      if (expandedTasks.has(name)) expandedTasks.delete(name);
      else expandedTasks.add(name);
      renderOrchestration(true);
    }

    async function launchPlan() {
      const btn = document.getElementById('btn-launch');
      const textarea = document.getElementById('plan-toml-input');
      const errEl = document.getElementById('plan-error');
      const projectSelect = document.getElementById('plan-project');
      const toml = textarea.value.trim();
      if (!toml) { errEl.textContent = 'Plan TOML is empty'; return; }

      btn.classList.add('loading');
      btn.textContent = 'Launching\u2026';
      errEl.textContent = '';

      const body = { plan_toml: toml };
      if (projectSelect && projectSelect.value && projectSelect.value !== '__new__') {
        body.project_root = projectSelect.value;
      }

      try {
        const res = await apiFetch('/api/orchestrate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          orchestrationState = data.snapshot || data;
          orchPrUrl = null;
          orchDismissed = false;
          renderOrchestration();
        } else {
          const body = await res.json().catch(() => ({ error: res.statusText }));
          errEl.textContent = body.error || body.message || 'Launch failed (' + res.status + ')';
          btn.classList.remove('loading');
          btn.textContent = 'Launch';
        }
      } catch (e) {
        errEl.textContent = 'Network error: ' + e.message;
        btn.classList.remove('loading');
        btn.textContent = 'Launch';
      }
    }

    async function orchAbort(btn) {
      btn.disabled = true;
      btn.textContent = 'Aborting\u2026';
      try {
        await apiFetch('/api/orchestrate/abort', { method: 'POST' });
      } catch (_) {}
      btn.disabled = false;
      btn.textContent = 'Abort';
    }

    async function orchMerge(btn) {
      btn.disabled = true;
      btn.textContent = 'Merging\u2026';
      try {
        const res = await apiFetch('/api/orchestrate/merge', { method: 'POST' });
        if (!res.ok) {
          const body = await res.json().catch(() => ({ error: res.statusText }));
          alert('Merge failed: ' + (body.error || res.statusText));
        }
      } catch (e) {
        alert('Merge error: ' + e.message);
      }
      btn.disabled = false;
      btn.textContent = 'Merge';
    }

    async function orchPr(btn) {
      btn.disabled = true;
      btn.textContent = 'Creating\u2026';
      try {
        const res = await apiFetch('/api/orchestrate/pr', { method: 'POST' });
        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          orchPrUrl = data.pr_url || data.url || null;
          renderOrchestration();
        } else {
          const body = await res.json().catch(() => ({ error: res.statusText }));
          alert('PR failed: ' + (body.error || res.statusText));
        }
      } catch (e) {
        alert('PR error: ' + e.message);
      }
      btn.disabled = false;
      btn.textContent = 'Create PR';
    }

    async function orchRelaunch(btn) {
      // Relaunch the current active plan using its stored plan data
      if (!orchestrationState) return;
      await fetchPlanHistory();
      const name = orchestrationState.plan_name;
      const histEntry = planHistory.find(h => h.plan_name === name);
      if (!histEntry) {
        alert('Cannot relaunch: plan data not found in history. Try launching a new plan.');
        return;
      }
      // Fetch full entry (list doesn't include plan/project_root)
      await relaunchFromHistory(histEntry.id, btn);
    }

    async function relaunchFromHistory(id, btn) {
      try {
        const res = await apiFetch('/api/plans/history/' + encodeURIComponent(id));
        if (!res.ok) { alert('Failed to load plan data'); return; }
        const entry = await res.json();
        await doRelaunch(entry, btn);
      } catch (e) {
        alert('Relaunch error: ' + e.message);
      }
    }

    async function doRelaunch(entry, btn) {
      if (!entry.plan) { alert('Cannot relaunch: original plan definition missing'); return; }
      btn.disabled = true;
      btn.textContent = 'Relaunching\u2026';

      // Serialize the plan back to TOML
      const p = entry.plan;
      let toml = '[plan]\nname = "' + p.plan.name + '"\n';
      toml += 'branch = "' + (p.plan.branch || p.plan.name) + '"\n';
      if (p.plan.model) toml += 'model = "' + p.plan.model + '"\n';
      toml += 'on_complete = "' + (p.plan.on_complete || 'manual') + '"\n';
      if (p.plan.skip_permissions) toml += 'skip_permissions = true\n';
      for (const t of p.tasks) {
        toml += '\n[[tasks]]\nname = "' + t.name + '"\n';
        if (t.prompt.includes('\n')) {
          toml += "prompt = '''\n" + t.prompt + "\n'''\n";
        } else {
          toml += 'prompt = "' + t.prompt.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"\n';
        }
        if (t.model) toml += 'model = "' + t.model + '"\n';
        if (t.depends_on && t.depends_on.length) toml += 'depends_on = [' + t.depends_on.map(d => '"' + d + '"').join(', ') + ']\n';
        if (t.allowed_tools) toml += 'allowed_tools = "' + t.allowed_tools + '"\n';
      }

      const body = { plan_toml: toml };
      if (entry.project_root) body.project_root = entry.project_root;

      try {
        const res = await apiFetch('/api/orchestrate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          orchestrationState = data.snapshot || data;
          orchPrUrl = null;
          orchDismissed = false;
          selectedHistoryId = null;
          renderOrchestration(true);
        } else {
          const rb = await res.json().catch(() => ({ error: res.statusText }));
          alert('Relaunch failed: ' + (rb.error || res.statusText));
        }
      } catch (e) {
        alert('Relaunch error: ' + e.message);
      }
      btn.disabled = false;
      btn.textContent = 'Relaunch';
    }

    let orchDismissed = false;

    function orchReset() {
      orchestrationState = null;
      orchPrUrl = null;
      orchDismissed = true;
      expandedTasks.clear();
      fetchPlanHistory();
      renderOrchestration(true);
    }

    async function fetchProjects() {
      try {
        const res = await apiFetch('/api/projects');
        if (res.ok) projects = await res.json();
      } catch (_) {}
    }

    async function fetchPlanHistory() {
      try {
        const res = await apiFetch('/api/plans/history');
        if (res.ok) planHistory = await res.json();
      } catch (_) {}
    }

    async function fetchOrchStatus() {
      if (orchDismissed) return;
      try {
        const res = await apiFetch('/api/orchestrate/status');
        if (res.ok) {
          const data = await res.json();
          if (data && data.plan_name) {
            orchestrationState = data;
            if (activeTab === 'plans') renderOrchestration();
          }
        }
      } catch (_) {}
    }

    function startOrchPoll() {
      if (orchPollTimer) return;
      orchPollTimer = setInterval(fetchOrchStatus, 3000);
    }

    // ── Config toggles ──
    function renderConfigToggles() {
      const hBtn = document.getElementById('btn-auto-handoff');
      const cBtn = document.getElementById('btn-auto-commit');
      if (hBtn) {
        hBtn.className = 'btn-toggle ' + (configAutoHandoff ? 'on' : 'off');
        hBtn.textContent = configAutoHandoff ? 'auto ON' : 'auto OFF';
      }
      if (cBtn) {
        cBtn.className = 'btn-toggle ' + (configAutoCommit ? 'on' : 'off');
        cBtn.textContent = configAutoCommit ? 'git \u25CF' : 'git \u25CB';
      }
    }

    async function toggleConfig(key) {
      if (key === 'auto_handoff') configAutoHandoff = !configAutoHandoff;
      if (key === 'auto_commit') configAutoCommit = !configAutoCommit;
      renderConfigToggles();

      const btn = key === 'auto_handoff'
        ? document.getElementById('btn-auto-handoff')
        : document.getElementById('btn-auto-commit');

      try {
        const newValue = key === 'auto_handoff' ? configAutoHandoff : configAutoCommit;
        const res = await apiFetch('/api/config/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: key, value: newValue })
        });
        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          if (data.value != null) {
            if (key === 'auto_handoff') configAutoHandoff = data.value;
            if (key === 'auto_commit') configAutoCommit = data.value;
          }
          renderConfigToggles();
        }
        if (btn) {
          btn.classList.add('flash');
          setTimeout(() => btn.classList.remove('flash'), 400);
        }
      } catch (_) {
        if (key === 'auto_handoff') configAutoHandoff = !configAutoHandoff;
        if (key === 'auto_commit') configAutoCommit = !configAutoCommit;
        renderConfigToggles();
      }
    }

    async function fetchConfig() {
      try {
        const res = await apiFetch('/api/config');
        if (res.ok) {
          const data = await res.json();
          if (data.auto_handoff != null) configAutoHandoff = data.auto_handoff;
          if (data.auto_commit != null) configAutoCommit = data.auto_commit;
          if (data.workspaces) configWorkspaces = data.workspaces;
          renderConfigToggles();
        }
      } catch (_) {}
    }

    // ── Browser notifications ──
    function checkNotifPermission() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'default') {
        const banner = document.getElementById('notif-banner');
        if (banner) banner.style.display = 'flex';
      }
    }

    function requestNotifPermission() {
      if (!('Notification' in window)) return;
      Notification.requestPermission().then(() => {
        const banner = document.getElementById('notif-banner');
        if (banner) banner.style.display = 'none';
      });
    }

    function dismissNotifBanner() {
      const banner = document.getElementById('notif-banner');
      if (banner) banner.style.display = 'none';
    }

    function notifyHandoff(msg) {
      if (Notification.permission === 'granted') {
        new Notification('relay \u2014 handoff saved', {
          body: 'Handoff ' + (msg.id || '') + ' created',
          icon: '/favicon.svg'
        });
      }
    }

    function notifyOrchStateChange(newState) {
      if (Notification.permission !== 'granted') return;
      if (newState === 'completed' || newState === 'failed') {
        const s = orchestrationState;
        const counts = s && s.counts ? s.counts : {};
        const total = s && s.tasks ? s.tasks.length : 0;
        new Notification('relay \u2014 plan ' + newState, {
          body: (s ? s.plan_name : 'Plan') + ': ' + (counts.done || 0) + '/' + total + ' tasks done',
          icon: '/favicon.svg'
        });
      }
    }

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;

      switch (e.key) {
        case '1': switchTab('sessions'); break;
        case '2': switchTab('handoffs'); break;
        case '3': switchTab('plans'); break;
        case 'j':
        case 'k': {
          if (activeTab !== 'sessions' || !sessions.length) return;
          const idx = sessions.findIndex(s => s.session_id === selectedId);
          let next;
          if (e.key === 'j') next = Math.min(sessions.length - 1, idx + 1);
          else next = Math.max(0, idx - 1);
          selectSession(sessions[next].session_id);
          const cards = document.querySelectorAll('.session-card');
          if (cards[next]) cards[next].scrollIntoView({ block: 'nearest' });
          break;
        }
        case 'Enter': {
          if (activeTab !== 'sessions') return;
          const sel = getSelected();
          if (sel) {
            renderSessionDetail();
            renderSessionMetrics();
          }
          break;
        }
      }
    });

    // ── Init ──
    async function initApp() {
      try {
        const res = await apiFetch('/api/config');
        if (res.status === 401) {
          _authToken = null;
          localStorage.removeItem('relay_token');
          document.getElementById('auth-error').textContent =
            document.getElementById('auth-token').value ? 'Invalid token' : '';
          showAuth();
          return;
        }
        hideAuth();
      } catch (_) {
        // Server unreachable — proceed anyway, WS will retry
        hideAuth();
      }
      await fetchVersion();
      await Promise.allSettled([fetchSessions(), fetchHandoffs(), fetchOrchStatus(), fetchConfig(), fetchProjects(), fetchPlanHistory()]);
      connectWs();
      startOrchPoll();
      setInterval(fetchConfig, 5000); // poll config to sync TUI toggles
      checkNotifPermission();
      renderConfigToggles();
    }

    initApp();
  </script>
</body>
</html>
