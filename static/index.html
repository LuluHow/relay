<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>relay</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0a;
      --bg-alt:     #0f0f0f;
      --text:       #d7d7d7;
      --dim:        #8a8a8a;
      --muted:      #555555;
      --green:      #7fd17f;
      --green-glow: #a8e8a8;
      --amber:      #d4b36a;
      --red:        #d17f7f;
      --cyan:       #7fc8d1;
      --violet:     #b39cd1;
      --border:     #242424;
      --sel-bg:     #16221a;
      --font:       ui-monospace, "SF Mono", "Cascadia Code", monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 15px;
      font-weight: bold;
      color: var(--green);
      letter-spacing: 0.06em;
    }

    .version {
      color: var(--muted);
      font-size: 11px;
    }

    .header-stats {
      display: flex;
      gap: 10px;
      font-size: 11px;
      color: var(--dim);
      margin-left: 12px;
    }

    .header-stats .stat-val { color: var(--text); }

    .tab-group {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-left: auto;
    }

    .tab-btn {
      padding: 3px 12px;
      font-size: 11px;
      font-family: var(--font);
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { background: var(--sel-bg); color: var(--green); }
    .tab-btn + .tab-btn { border-left: 1px solid var(--border); }

    /* ── Auth screen ── */
    .auth-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-overlay[hidden] { display: none; }

    .auth-box {
      width: 320px;
      text-align: center;
    }

    .auth-box .logo { font-size: 22px; display: block; margin-bottom: 6px; }
    .auth-box .auth-sub { color: var(--dim); font-size: 12px; margin-bottom: 24px; }

    .auth-box input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      margin-bottom: 12px;
    }
    .auth-box input:focus { border-color: var(--green); }
    .auth-box input::placeholder { color: var(--muted); }

    .auth-box button {
      width: 100%;
      padding: 9px;
      background: var(--green);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .auth-box button:hover { opacity: 0.85; }

    .auth-error {
      color: var(--red);
      font-size: 11px;
      margin-top: 10px;
      min-height: 1.5em;
    }

    .ws-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 10px;
      font-size: 11px;
      color: var(--dim);
    }

    .ws-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .ws-dot.connected    { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .ws-dot.reconnecting { background: var(--amber); }
    .ws-dot.disconnected { background: var(--red); }

    /* ── 3-column layout ── */
    .layout {
      display: grid;
      grid-template-columns: 250px 1fr 300px;
      overflow: hidden;
    }

    .col {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }
    .col:last-child { border-right: none; }

    .col-title {
      padding: 6px 12px;
      font-size: 10px;
      font-weight: bold;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      flex-shrink: 0;
    }

    .col-body {
      flex: 1;
      overflow-y: auto;
    }

    /* ── Left: Session list ── */
    .session-card {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }
    .session-card:hover { background: var(--bg-alt); }
    .session-card.selected {
      background: var(--sel-bg);
      border-left: 2px solid var(--green);
      padding-left: 10px;
    }

    .card-r1 {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-project {
      font-size: 12px;
      font-weight: bold;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .card-sid {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .card-r2 {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
      font-size: 11px;
    }
    .card-state {
      color: var(--dim);
      flex-shrink: 0;
    }
    .card-cwd {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-r3 {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 3px;
      font-size: 11px;
    }
    .card-age { color: var(--dim); flex-shrink: 0; }
    .card-spark {
      color: var(--green);
      font-size: 10px;
      letter-spacing: -0.5px;
      overflow: hidden;
      flex: 1;
    }
    .card-tokens {
      color: var(--dim);
      flex-shrink: 0;
      text-align: right;
    }

    /* ── Center: Session detail ── */
    .detail-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      flex-shrink: 0;
    }

    .detail-r1 {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .detail-project {
      font-size: 14px;
      font-weight: bold;
      color: var(--text);
    }
    .detail-state {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .detail-actions { margin-left: auto; }

    .detail-r2 {
      margin-top: 4px;
      font-size: 11px;
      color: var(--dim);
    }
    .detail-r2 .val { color: var(--text); }
    .detail-r2 .branch { color: var(--amber); }
    .detail-r2 .added { color: var(--green); }
    .detail-r2 .removed { color: var(--red); }

    /* KPI strip */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .kpi-box {
      padding: 8px 12px;
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .kpi-box:last-child { border-right: none; }
    .kpi-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .kpi-value {
      font-size: 13px;
      color: var(--text);
      margin-top: 2px;
    }

    /* Tool timeline */
    .tl-title {
      padding: 6px 14px;
      font-size: 10px;
      font-weight: bold;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
    }

    .tl-body {
      flex: 1;
      overflow-y: auto;
    }

    .tl-entry {
      padding: 3px 14px;
      font-size: 11px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #1a1a1a;
      align-items: baseline;
    }
    .tl-time { color: var(--muted); flex-shrink: 0; font-size: 10px; }
    .tl-name { font-weight: bold; flex-shrink: 0; }
    .tl-icon { flex-shrink: 0; }
    .tl-input {
      color: var(--dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Detail body grid */
    .detail-body {
      flex: 1;
      display: grid;
      grid-template-areas:
        "tools tools"
        "files prompts";
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr auto;
      overflow: hidden;
    }
    .detail-body-tools {
      grid-area: tools;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .detail-body-files {
      grid-area: files;
      padding: 8px 14px;
      overflow-y: auto;
      max-height: 200px;
      border-top: 1px solid var(--border);
    }
    .detail-body-prompts {
      grid-area: prompts;
      padding: 8px 14px;
      overflow-y: auto;
      max-height: 200px;
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }

    .section-title {
      font-size: 10px;
      font-weight: bold;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .file-entry {
      font-size: 11px;
      display: flex;
      gap: 6px;
      padding: 1px 0;
    }
    .file-marker { font-weight: bold; flex-shrink: 0; width: 12px; }
    .file-marker-a { color: var(--green); }
    .file-marker-m { color: var(--amber); }
    .file-path {
      color: var(--dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .msg-entry {
      font-size: 11px;
      padding: 2px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .msg-user { color: var(--cyan); }
    .msg-assistant { color: var(--dim); }
    .msg-prefix { color: var(--muted); }

    /* ── Right: Metrics ── */
    .metric-group {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .metric-label {
      font-size: 9px;
      font-weight: bold;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 14px;
      color: var(--text);
    }
    .metric-value .unit { font-size: 11px; color: var(--dim); }
    .metric-spark {
      color: var(--green);
      font-size: 11px;
      letter-spacing: -0.5px;
      margin-left: 6px;
    }

    .rate-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      margin-top: 3px;
    }
    .rate-label { color: var(--dim); width: 20px; flex-shrink: 0; }
    .rate-bar { letter-spacing: -1px; font-size: 12px; flex: 1; }
    .rate-pct { color: var(--dim); width: 32px; text-align: right; flex-shrink: 0; }

    .ctx-full-bar {
      font-size: 12px;
      letter-spacing: -1px;
      margin-top: 4px;
    }
    .ctx-detail {
      font-size: 11px;
      color: var(--dim);
    }

    .compaction-badge {
      font-size: 11px;
      color: var(--amber);
      padding: 2px 0;
    }

    .activity-entry {
      font-size: 10px;
      display: flex;
      gap: 6px;
      padding: 1px 0;
      color: var(--dim);
    }
    .activity-time { color: var(--muted); flex-shrink: 0; }
    .activity-name { flex-shrink: 0; }

    /* ── Status dots ── */
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-working  { background: var(--green);  box-shadow: 0 0 4px var(--green); }
    .dot-waiting  { background: var(--amber); }
    .dot-starting { background: var(--cyan); }
    .dot-ended    { background: var(--red); }
    .dot-idle     { background: var(--muted); }

    /* ── Handoff button ── */
    .btn-handoff {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 2px 7px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-handoff:hover   { border-color: var(--green); color: var(--green); }
    .btn-handoff.saving  { border-color: var(--amber); color: var(--amber); }
    .btn-handoff.saved   { border-color: var(--green); color: var(--green); }
    .btn-handoff.errored { border-color: var(--red);   color: var(--red); }

    /* ── Handoffs view ── */
    .handoffs-view {
      overflow-y: auto;
      padding: 0;
    }

    .handoff-item {
      border-bottom: 1px solid var(--border);
    }

    .handoff-header {
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .handoff-header:hover { background: var(--bg-alt); }

    .handoff-id {
      color: var(--cyan);
      font-size: 12px;
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .handoff-meta {
      color: var(--muted);
      font-size: 10px;
      margin-top: 1px;
    }

    .handoff-preview {
      color: var(--dim);
      font-size: 11px;
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .handoff-content {
      display: none;
      padding: 10px 12px;
      background: var(--sel-bg);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--dim);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 280px;
      overflow-y: auto;
    }
    .handoff-content.visible { display: block; }

    .handoff-content .md-h1 { color: var(--text); font-weight: bold; }
    .handoff-content .md-h2 { color: var(--text); font-weight: bold; }
    .handoff-content .md-bold { color: var(--text); }

    /* ── Plans view ── */
    .plans-view {
      display: none;
      flex: 1;
      overflow: hidden;
    }

    .plans-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      height: 100%;
      overflow: hidden;
    }

    .plans-sidebar {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .plans-sidebar .col-title {
      padding: 6px 12px;
      font-size: 10px;
      font-weight: bold;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      flex-shrink: 0;
    }

    .plans-sidebar-body {
      flex: 1;
      overflow-y: auto;
    }

    .plan-history-item {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .plan-history-item:hover { background: var(--bg-alt); }
    .plan-history-item.selected {
      background: var(--sel-bg);
      border-left: 2px solid var(--green);
      padding-left: 10px;
    }

    .plan-history-item .phi-name {
      font-size: 12px;
      font-weight: bold;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .plan-history-item .phi-meta {
      font-size: 10px;
      color: var(--dim);
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }

    .plan-history-item .phi-state { font-size: 10px; }

    .plans-main {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex: 1;
    }

    .btn-new-plan {
      margin: 8px 12px;
      padding: 5px 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-new-plan:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .new-project-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }
    .new-project-row select,
    .new-project-row input {
      flex: 1;
    }
    .new-project-row input {
      background: var(--bg-alt);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 8px;
      font-family: var(--font);
      font-size: 12px;
    }
    .new-project-row input:focus {
      outline: none;
      border-color: var(--green);
    }
    .new-project-row select {
      background: var(--bg-alt);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 8px;
      font-family: var(--font);
      font-size: 12px;
      max-width: 200px;
    }

    .plan-launch {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      padding: 32px;
      gap: 14px;
    }

    .plan-launch label {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      align-self: stretch;
      max-width: 600px;
      margin: 0 auto;
    }

    .plan-launch textarea {
      width: 100%;
      max-width: 600px;
      min-height: 240px;
      background: var(--bg-alt);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      font-family: var(--font);
      font-size: 12px;
      line-height: 1.5;
      resize: vertical;
    }
    .plan-launch textarea:focus {
      outline: none;
      border-color: var(--green);
    }

    .plan-launch .btn-launch {
      background: none;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 6px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 12px;
      transition: all 0.15s;
    }
    .plan-launch .btn-launch:hover {
      background: var(--sel-bg);
    }
    .plan-launch .btn-launch.loading {
      border-color: var(--amber);
      color: var(--amber);
      pointer-events: none;
    }

    .plan-launch select {
      width: 100%;
      max-width: 600px;
      background: var(--bg-alt);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
    }
    .plan-launch select:focus {
      outline: none;
      border-color: var(--green);
    }

    .plan-error {
      color: var(--red);
      font-size: 11px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    /* ── Wizard / TOML mode tabs ── */
    .plan-mode-tabs {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      align-self: center;
      margin-bottom: 4px;
    }
    .plan-mode-btn {
      padding: 3px 14px;
      font-size: 11px;
      font-family: var(--font);
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.15s;
    }
    .plan-mode-btn:hover { color: var(--text); }
    .plan-mode-btn.active { background: var(--sel-bg); color: var(--green); }
    .plan-mode-btn + .plan-mode-btn { border-left: 1px solid var(--border); }

    /* ── Wizard form ── */
    .wizard-form {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .wizard-form .field-row {
      display: flex;
      gap: 10px;
    }
    .wizard-form .field-row > .field-group { flex: 1; }
    .wizard-form .field-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .wizard-form .field-group label {
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0;
      align-self: flex-start;
    }
    .wizard-form input,
    .wizard-form select,
    .wizard-form textarea {
      width: 100%;
      background: var(--bg-alt);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 8px;
      font-family: var(--font);
      font-size: 12px;
    }
    .wizard-form input:focus,
    .wizard-form select:focus,
    .wizard-form textarea:focus {
      outline: none;
      border-color: var(--green);
    }
    .wizard-form textarea {
      min-height: 60px;
      resize: vertical;
      line-height: 1.5;
    }

    .wizard-section-title {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      margin-top: 6px;
    }

    /* ── Task cards in wizard ── */
    .wizard-task {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }
    .wizard-task .task-head {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .wizard-task .task-num {
      font-size: 10px;
      color: var(--muted);
      min-width: 14px;
    }
    .wizard-task .task-head input {
      flex: 1;
    }
    .btn-remove-task {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      line-height: 1;
    }
    .btn-remove-task:hover { color: var(--red); }

    .btn-add-task {
      background: none;
      border: 1px dashed var(--border);
      color: var(--dim);
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      transition: all 0.15s;
    }
    .btn-add-task:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .wizard-toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .wizard-toggle-row input[type="checkbox"] {
      width: auto;
      accent-color: var(--green);
    }
    .wizard-toggle-row label {
      font-size: 11px !important;
      text-transform: none !important;
      color: var(--text) !important;
      letter-spacing: 0 !important;
    }

    /* Plan monitoring */
    .plan-monitor {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .plan-header-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .plan-name {
      font-size: 14px;
      font-weight: bold;
      color: var(--text);
    }

    .plan-branch {
      font-size: 11px;
      color: var(--amber);
    }

    .plan-state-badge {
      font-size: 10px;
      padding: 1px 8px;
      border-radius: 3px;
      border: 1px solid;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .plan-elapsed {
      font-size: 11px;
      color: var(--dim);
    }

    .plan-counts {
      font-size: 11px;
      color: var(--dim);
      margin-left: auto;
    }
    .plan-counts .cnt-val { color: var(--text); }

    /* Task list */
    .task-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .task-card {
      margin: 0 14px 6px;
      padding: 8px 12px;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .task-card:hover {
      background: var(--sel-bg);
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-status-icon {
      flex-shrink: 0;
      font-size: 12px;
      width: 16px;
      text-align: center;
    }
    .task-status-icon.pending  { color: var(--muted); }
    .task-status-icon.blocked  { color: var(--muted); opacity: 0.6; }
    .task-status-icon.running  { color: var(--green); }
    .task-status-icon.done     { color: var(--green); }
    .task-status-icon.failed   { color: var(--red); }

    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 4px var(--green-glow); }
      50%      { text-shadow: 0 0 10px var(--green-glow), 0 0 16px var(--green); }
    }
    .task-status-icon.running {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .task-name {
      font-size: 12px;
      font-weight: bold;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-elapsed {
      font-size: 10px;
      color: var(--dim);
      flex-shrink: 0;
    }

    .task-deps {
      font-size: 10px;
      color: var(--muted);
      margin-left: 24px;
      margin-top: 2px;
    }

    .task-output {
      display: none;
      margin-top: 8px;
      margin-left: 24px;
    }
    .task-output.visible { display: block; }

    .task-output pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 10px;
      font-family: var(--font);
      font-size: 11px;
      color: var(--dim);
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .task-exit-code {
      font-size: 10px;
      margin-top: 4px;
      color: var(--muted);
    }
    .task-exit-code.success { color: var(--green); }
    .task-exit-code.failure { color: var(--red); }

    /* Plan action bar */
    .plan-actions {
      display: flex;
      gap: 8px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      background: var(--bg-alt);
      flex-shrink: 0;
    }

    .plan-actions .btn-plan {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      transition: all 0.15s;
    }
    .plan-actions .btn-plan:hover   { opacity: 0.85; }
    .plan-actions .btn-plan.abort   { border-color: var(--red);   color: var(--red); }
    .plan-actions .btn-plan.merge   { border-color: var(--green); color: var(--green); }
    .plan-actions .btn-plan.pr      { border-color: var(--cyan);  color: var(--cyan); }
    .plan-actions .btn-plan.newplan { border-color: var(--border); color: var(--dim); }
    .plan-actions .btn-plan:disabled { opacity: 0.4; pointer-events: none; }

    .plan-actions .pr-url {
      font-size: 11px;
      color: var(--cyan);
      align-self: center;
      margin-left: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .plan-actions .pr-url a { color: var(--cyan); }

    /* ── Empty states ── */
    .empty {
      padding: 28px 16px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    .empty-detail {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 12px;
    }

    /* ── Footer ── */
    footer {
      display: flex;
      gap: 16px;
      padding: 4px 14px;
      background: var(--bg-alt);
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .footer-hints { margin-left: auto; color: var(--border); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    /* ── Pulsing dot for running sessions ── */
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 4px var(--green); }
      50%      { box-shadow: 0 0 8px var(--green), 0 0 14px var(--green-glow); }
    }
    .dot-working {
      animation: pulse-dot 2s ease-in-out infinite;
    }

    /* ── Config toggle buttons ── */
    .config-toggles {
      display: flex;
      gap: 6px;
      margin-left: 8px;
    }

    .btn-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 10px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-toggle:hover { opacity: 0.85; }
    .btn-toggle.on  { border-color: var(--green); color: var(--green); }
    .btn-toggle.off { border-color: var(--red);   color: var(--red); }
    .btn-toggle.flash {
      animation: flash-border 0.4s ease;
    }
    @keyframes flash-border {
      50% { box-shadow: 0 0 8px var(--green-glow); }
    }

    /* ── Notification banner ── */
    .notif-banner {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 4px 14px;
      background: #1a1a2e;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--dim);
    }
    .notif-banner button {
      background: none;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      padding: 1px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 10px;
    }
    .notif-banner .dismiss {
      border-color: var(--border);
      color: var(--muted);
    }

    /* ── Mobile back button ── */
    .mobile-back {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      margin-right: 6px;
      flex-shrink: 0;
    }
    .mobile-back:hover { color: var(--text); border-color: var(--muted); }

    /* ── Plans sidebar toggle (mobile) ── */
    .plans-sidebar-toggle {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      margin: 8px 12px;
      flex-shrink: 0;
    }
    .plans-sidebar-toggle:hover { color: var(--text); border-color: var(--muted); }

    /* ── Responsive: Tablet ── */
    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 250px 1fr;
      }
      #col-right {
        display: none;
      }
    }

    /* ── Responsive: Mobile ── */
    @media (max-width: 768px) {
      html { font-size: 12px; }

      /* ── Header ── */
      header {
        gap: 4px;
        padding: 6px 10px;
        flex-wrap: wrap;
      }

      .header-stats {
        display: none;
      }

      .config-toggles {
        order: 9;
        margin-left: 0;
      }

      .tab-group {
        margin-left: auto;
        order: 2;
      }

      .ws-status {
        margin-left: 0;
        order: 3;
      }

      .mobile-back { display: inline-flex; }

      /* ── Sessions view ── */
      .layout {
        grid-template-columns: 1fr;
      }

      #col-left {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      /* Mobile: show list OR detail, not both */
      .layout.mobile-detail #col-left {
        display: none;
      }
      .layout:not(.mobile-detail) #col-center {
        display: none;
      }

      .session-card { padding: 8px 10px; }

      .kpi-strip {
        grid-template-columns: repeat(2, 1fr);
      }

      .detail-head { padding: 8px 10px; }

      .detail-body {
        grid-template-areas:
          "tools files"
          "prompts prompts";
        grid-template-rows: 1fr auto;
      }
      .detail-body-files {
        border-top: none;
        border-left: 1px solid var(--border);
        max-height: none;
      }
      .detail-body-prompts {
        border-left: none;
        border-top: 1px solid var(--border);
      }

      /* ── Handoffs view ── */
      .handoffs-view {
        padding: 0;
      }

      .handoff-header {
        padding: 10px 10px;
      }

      .handoff-id {
        font-size: 11px;
        word-break: break-all;
        white-space: normal;
      }

      .handoff-content {
        padding: 10px;
        max-height: 60vh;
      }

      /* ── Plans view ── */
      .plans-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .plans-sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: none;
        overflow: visible;
      }

      .plans-sidebar.collapsed .plans-sidebar-body {
        display: none;
      }
      .plans-sidebar.collapsed .btn-new-plan {
        display: none;
      }

      .plans-sidebar-toggle {
        display: block;
      }

      .plans-sidebar-body {
        max-height: 30vh;
        overflow-y: auto;
      }

      .plan-launch {
        padding: 16px 12px;
        gap: 10px;
      }

      .plan-launch textarea {
        min-height: 160px;
        max-width: 100%;
      }

      .plan-launch label {
        max-width: 100%;
      }

      .plan-launch select {
        max-width: 100%;
      }

      .plan-error {
        max-width: 100%;
      }

      .plan-header-bar {
        padding: 8px 10px;
        gap: 6px;
      }

      .plan-name {
        font-size: 13px;
      }

      .plan-counts {
        margin-left: 0;
        width: 100%;
      }

      .task-card {
        margin: 0 8px 6px;
        padding: 8px 10px;
      }

      .task-output pre {
        font-size: 10px;
        max-height: 200px;
      }

      .plan-actions {
        flex-wrap: wrap;
        padding: 8px 10px;
        gap: 6px;
      }

      .plan-actions .btn-plan {
        flex: 1;
        min-width: 0;
        text-align: center;
        padding: 6px 8px;
      }

      .plan-mode-tabs {
        align-self: stretch;
      }
      .plan-mode-btn {
        flex: 1;
        text-align: center;
      }

      /* Prevent iOS auto-zoom on input focus (requires font-size >= 16px) */
      input, select, textarea {
        font-size: 16px !important;
      }

      /* ── Footer ── */
      footer {
        flex-wrap: wrap;
        padding: 4px 10px;
        gap: 8px;
      }
      .footer-hints { display: none; }
    }
  </style>
</head>
<body>
  <!-- Auth overlay (shown when token required) -->
  <div class="auth-overlay" id="auth-overlay" hidden>
    <div class="auth-box">
      <span class="logo">relay</span>
      <div class="auth-sub">Enter your API token to continue</div>
      <form id="auth-form" onsubmit="return handleLogin(event)">
        <input type="password" id="auth-token" placeholder="API token" autocomplete="off" autofocus>
        <button type="submit">Sign in</button>
      </form>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>

  <header>
    <span class="logo">relay</span>
    <span class="version" id="version">v&mdash;</span>
    <div class="header-stats" id="header-stats"></div>
    <div class="tab-group">
      <button class="tab-btn active" data-tab="sessions" onclick="switchTab('sessions')">Sessions</button>
      <button class="tab-btn" data-tab="handoffs" onclick="switchTab('handoffs')">Handoffs</button>
      <button class="tab-btn" data-tab="plans" onclick="switchTab('plans')">Plans</button>
    </div>
    <div class="config-toggles" id="config-toggles">
      <button class="btn-toggle off" id="btn-auto-handoff" onclick="toggleConfig('auto_handoff')" title="Toggle auto-handoff">auto OFF</button>
      <button class="btn-toggle off" id="btn-auto-commit" onclick="toggleConfig('auto_commit')" title="Toggle auto-commit">git &#9675;</button>
    </div>
    <div class="ws-status">
      <span id="ws-label">connecting</span>
      <div class="ws-dot reconnecting" id="ws-dot"></div>
    </div>
    <div class="notif-banner" id="notif-banner" style="display:none">
      <span>Enable notifications for handoff alerts</span>
      <button onclick="requestNotifPermission()">Enable</button>
      <button class="dismiss" onclick="dismissNotifBanner()">Dismiss</button>
    </div>
  </header>

  <!-- Sessions 3-column view -->
  <div class="layout" id="sessions-view">
    <div class="col" id="col-left">
      <div class="col-title">Sessions</div>
      <div class="col-body" id="session-list">
        <div class="empty">Loading&hellip;</div>
      </div>
    </div>
    <div class="col" id="col-center">
      <div class="empty-detail" id="detail-empty">Select a session</div>
      <div id="detail-content" style="display:none;flex-direction:column;height:100%;overflow:hidden"></div>
    </div>
    <div class="col" style="border-right:none" id="col-right">
      <div class="col-title">Metrics</div>
      <div class="col-body" id="metrics-body">
        <div class="empty">Select a session</div>
      </div>
    </div>
  </div>

  <!-- Handoffs view -->
  <div class="handoffs-view" id="handoffs-view" style="display:none">
    <div class="empty">Loading&hellip;</div>
  </div>

  <!-- Plans view -->
  <div class="plans-view" id="plans-view" style="display:none"></div>

  <footer>
    <span id="footer-counts">&mdash;</span>
    <span id="footer-updated">&mdash;</span>
    <span id="footer-uptime"></span>
    <span class="footer-hints">1/2/3 tabs &middot; j/k navigate &middot; enter select</span>
  </footer>

  <script>
    // ── morphdom 2.7.4 (MIT) — DOM reconciliation ──
    // https://github.com/patrick-steele-idem/morphdom

    // ── Auth ──
    let _authToken = new URLSearchParams(window.location.search).get('token')
      || localStorage.getItem('relay_token')
      || null;

    function apiFetch(path, opts = {}) {
      if (_authToken) {
        opts.headers = opts.headers || {};
        if (typeof opts.headers === 'object' && !Array.isArray(opts.headers)) {
          opts.headers['Authorization'] = 'Bearer ' + _authToken;
        }
      }
      return fetch(path, opts);
    }

    function handleLogin(e) {
      e.preventDefault();
      const token = document.getElementById('auth-token').value.trim();
      if (!token) return false;
      _authToken = token;
      document.getElementById('auth-error').textContent = '';
      initApp();
      return false;
    }

    function showAuth() {
      document.getElementById('auth-overlay').hidden = false;
      document.getElementById('auth-token').focus();
    }

    function hideAuth() {
      document.getElementById('auth-overlay').hidden = true;
      // Persist token for future visits
      if (_authToken) localStorage.setItem('relay_token', _authToken);
      // Clean token from URL if present
      const url = new URL(location.href);
      if (url.searchParams.has('token')) {
        url.searchParams.delete('token');
        history.replaceState(null, '', url.pathname + url.search);
      }
    }

    function logout() {
      _authToken = null;
      localStorage.removeItem('relay_token');
      showAuth();
    }

    // ── State ──
    let sessions = [];
    let handoffs = [];
    let selectedId = null;
    let activeTab = 'sessions';
    let ws = null;
    let reconnectTimer = null;
    const expandedHandoffs = new Set();
    const handoffCache = {};
    const sessionDetailCache = {};  // session_id -> full detail (tool_uses, messages, etc.)
    let detailFetchInFlight = null; // session_id being fetched
    let orchestrationState = null;
    let orchPollTimer = null;
    const expandedTasks = new Set();
    let orchPrUrl = null;
    let projects = [];
    let planHistory = [];
    let selectedHistoryId = null;
    let planMode = 'wizard'; // 'wizard' or 'toml'
    let wizardTasks = [{ name: '', prompt: '', model: '', depends_on: '', allowed_tools: '' }];
    let wizardPlan = { name: '', branch: '', model: '', on_complete: 'manual', skip_permissions: true, project: '' };
    let configAutoHandoff = false;
    let configAutoCommit = false;
    let configWorkspaces = [];
    let serverUptime = null;
    let uptimeFetchedAt = null;

    // ── Formatters ──
    function fmtAge(secs) {
      if (secs < 60)   return secs + 's';
      if (secs < 3600) return Math.floor(secs / 60) + 'm';
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      return h + 'h' + (m ? m + 'm' : '');
    }

    function fmtElapsed(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      if (h > 0) return h + 'h ' + m + 'm';
      if (m > 0) return m + 'm';
      return '<1m';
    }

    function fmtCost(usd) {
      if (usd < 0.001) return '$0.00';
      if (usd < 0.01)  return '<$0.01';
      return '$' + usd.toFixed(2);
    }

    function fmtTokens(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return String(n);
    }

    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + 'B';
      return (bytes / 1024).toFixed(1) + 'KB';
    }

    function fmtTime(iso) {
      if (!iso) return '--:--:--';
      const d = new Date(iso);
      return d.toLocaleTimeString('en-US', { hour12: false });
    }

    function ctxColor(pct) {
      if (pct >= 85) return 'var(--red)';
      if (pct >= 65) return 'var(--amber)';
      return 'var(--green)';
    }

    function rateLimitColor(pct) {
      if (pct >= 80) return 'var(--red)';
      if (pct >= 60) return 'var(--amber)';
      return 'var(--green)';
    }

    function dotClass(state) {
      return { working: 'dot-working', waiting: 'dot-waiting',
               starting: 'dot-starting', ended: 'dot-ended', idle: 'dot-idle' }[state] || 'dot-idle';
    }

    function stateColor(state) {
      return { working: 'var(--green)', waiting: 'var(--amber)',
               starting: 'var(--cyan)', ended: 'var(--red)', idle: 'var(--muted)' }[state] || 'var(--muted)';
    }

    function modelShort(m) {
      return m.replace('claude-', '').replace(/-\d{8}$/, '').replace('-latest', '');
    }

    function truncCwd(cwd) {
      if (!cwd) return '';
      return cwd.replace(/^\/Users\/[^/]+/, '~').replace(/^\/home\/[^/]+/, '~');
    }

    function shortId(id) {
      return id && id.length > 8 ? id.slice(0, 8) : (id || '');
    }

    function sparkline(values, maxLen) {
      if (!values || !values.length) return '';
      const chars = '\u2581\u2582\u2583\u2584\u2585\u2586\u2587\u2588';
      const data = maxLen && values.length > maxLen ? values.slice(-maxLen) : values;
      const max = Math.max(...data);
      if (max === 0) return chars[0].repeat(data.length);
      return data.map(v => chars[Math.min(7, Math.floor((v / max) * 7.99))]).join('');
    }

    function renderBar(pct, width) {
      width = width || 20;
      const filled = Math.round(Math.min(100, pct) / 100 * width);
      return '\u2588'.repeat(filled) + '\u2591'.repeat(width - filled);
    }

    function toolColor(name) {
      const n = (name || '').toLowerCase();
      if (n === 'edit' || n === 'write' || n === 'notebookedit') return 'var(--amber)';
      if (n === 'bash') return 'var(--green)';
      if (n === 'read') return 'var(--dim)';
      if (n === 'grep') return 'var(--cyan)';
      if (n === 'glob') return 'var(--violet)';
      return 'var(--text)';
    }

    function toolIcon(name) {
      const n = (name || '').toLowerCase();
      if (n === 'edit' || n === 'write') return '\u270E';
      if (n === 'bash') return '\u276F';
      if (n === 'read') return '\u25C7';
      if (n === 'grep') return '\u2295';
      if (n === 'glob') return '\u25C8';
      if (n === 'agent') return '\u25C9';
      return '\u25CB';
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderMd(md) {
      return esc(md)
        .replace(/^# (.+)$/gm,   '<span class="md-h1"># $1</span>')
        .replace(/^## (.+)$/gm,  '<span class="md-h2">## $1</span>')
        .replace(/^### (.+)$/gm, '<span class="md-h2">### $1</span>')
        .replace(/\*\*(.+?)\*\*/g, '<strong class="md-bold">$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    // ── Helpers ──
    function getSelected() {
      if (!selectedId) return null;
      const summary = sessions.find(s => s.session_id === selectedId) || null;
      if (!summary) return null;
      const detail = sessionDetailCache[selectedId];
      if (detail) return Object.assign({}, summary, detail);
      return summary;
    }

    function hasDetail(s) {
      return s && sessionDetailCache[s.session_id];
    }

    function autoSelect() {
      if (sessions.length === 0) { selectedId = null; return; }
      const running = sessions.find(s => s.state === 'working');
      const newId = (running || sessions[0]).session_id;
      selectedId = newId;
      if (newId && !sessionDetailCache[newId]) {
        fetchSessionDetail(newId);
      }
    }

    function totalTok(s) {
      return (s.total_input_tokens || 0) + (s.total_output_tokens || 0);
    }

    function toolsPerMin(s) {
      const tools = s.tool_uses ? s.tool_uses.length : (s.tool_use_count || 0);
      const mins = (s.age_secs || 0) / 60;
      if (mins < 1) return tools.toFixed(1);
      return (tools / mins).toFixed(1);
    }

    function getMessages(s) {
      const msgs = [];
      if (s.user_messages) {
        for (const m of s.user_messages) msgs.push({ role: 'user', content: m.content, ts: m.timestamp });
      }
      if (s.assistant_messages) {
        for (const m of s.assistant_messages) msgs.push({ role: 'assistant', content: m.content, ts: m.timestamp });
      }
      msgs.sort((a, b) => {
        if (a.ts && b.ts) return a.ts.localeCompare(b.ts);
        return 0;
      });
      return msgs;
    }

    function relPath(fp, cwd) {
      if (cwd && fp.startsWith(cwd + '/')) return fp.slice(cwd.length + 1);
      return fp;
    }

    function getFileMarker(s, fp) {
      if (s.tool_uses) {
        const base = fp.split('/').pop();
        for (const t of s.tool_uses) {
          if (t.name === 'Write' && t.input_summary.includes(base)) return 'A';
        }
      }
      return 'M';
    }

    // ── Render ──
    // ── Render coalescing ──
    let _renderQueued = false;
    function render() {
      if (_renderQueued) return;
      _renderQueued = true;
      requestAnimationFrame(function() {
        _renderQueued = false;
        renderHeaderStats();
        updateFooter();
        if (activeTab === 'sessions') {
          renderSessionList();
          renderSessionDetail();
          renderSessionMetrics();
        }
      });
    }

    function renderHeaderStats() {
      let running = 0, waiting = 0, idle = 0, ended = 0, cost = 0, tok = 0;
      for (const s of sessions) {
        if (s.state === 'working') running++;
        else if (s.state === 'waiting') waiting++;
        else if (s.state === 'idle') idle++;
        else if (s.state === 'ended') ended++;
        cost += s.cost_usd || 0;
        tok += totalTok(s);
      }
      const el = document.getElementById('header-stats');
      const parts = [];
      if (running) parts.push('<span class="stat-val" style="color:var(--green)">' + running + '</span> running');
      if (waiting) parts.push('<span class="stat-val" style="color:var(--amber)">' + waiting + '</span> waiting');
      if (idle)    parts.push('<span class="stat-val" style="color:var(--muted)">' + idle + '</span> idle');
      if (ended)   parts.push('<span class="stat-val" style="color:var(--red)">' + ended + '</span> ended');
      if (cost > 0) parts.push('<span class="stat-val">' + fmtCost(cost) + '</span>');
      if (tok > 0)  parts.push('<span class="stat-val">' + fmtTokens(tok) + '</span> tok');
      patchDOM(el, parts.join(' <span style="color:var(--border)">\u00b7</span> '));
    }

    function renderSessionList() {
      const list = document.getElementById('session-list');
      if (!sessions.length) {
        list.innerHTML = '<div class="empty">No sessions found</div>';
        return;
      }

      let html = '';
      for (const s of sessions) {
        const sel = s.session_id === selectedId ? ' selected' : '';
        const tok = totalTok(s);
        const ctxPct = Math.round(s.context_pct || 0);

        html += '<div class="session-card' + sel + '" data-id="' + esc(s.session_id) + '" onclick="selectSession(\'' + esc(s.session_id) + '\')">'
          + '<div class="card-r1">'
          + '<span class="dot ' + dotClass(s.state) + '"></span>'
          + '<span class="card-project" title="' + esc(s.project_name) + '">' + esc(s.project_name) + '</span>'
          + '<span class="card-sid">' + esc(shortId(s.session_id)) + '</span>'
          + '</div>'
          + '<div class="card-r2">'
          + '<span class="card-state" style="color:' + stateColor(s.state) + '">' + esc(s.state) + '</span>'
          + '<span class="card-cwd" title="' + esc(s.cwd || '') + '">' + esc(truncCwd(s.cwd)) + '</span>'
          + '</div>'
          + '<div class="card-r3">'
          + '<span class="card-age">' + esc(fmtAge(s.age_secs)) + '</span>'
          + '<span class="card-spark" style="color:' + ctxColor(ctxPct) + '">' + ctxPct + '%</span>'
          + '<span class="card-tokens">' + esc(fmtTokens(tok)) + '</span>'

    function renderSessionDetail() {
      const emptyEl = document.getElementById('detail-empty');
      const contentEl = document.getElementById('detail-content');
      const s = getSelected();

      if (!s) {
        emptyEl.style.display = 'flex';
        contentEl.style.display = 'none';
        return;
      }

      emptyEl.style.display = 'none';
      contentEl.style.display = 'flex';

      const tok = totalTok(s);
      const ctxTok = s.current_context_tokens || 0;
      const winTok = s.context_window_size || 0;
      const hasFullDetail = !!(s.user_messages || s.assistant_messages);
      const msgCount = hasFullDetail
        ? (s.user_messages ? s.user_messages.length : 0) + (s.assistant_messages ? s.assistant_messages.length : 0)
        : (s.user_message_count || 0) + (s.assistant_message_count || 0);

      // Detail head
      let html = '<div class="detail-head">'
        + '<div class="detail-r1">'
        + '<button class="mobile-back" onclick="mobileBackToList()">\u2190 Back</button>'
        + '<span class="dot ' + dotClass(s.state) + '"></span>'
        + '<span class="detail-project">' + esc(s.project_name) + '</span>'
        + '<span class="detail-state" style="color:' + stateColor(s.state) + ';border-color:' + stateColor(s.state) + '">' + esc(s.state) + '</span>'
        + '<span class="detail-actions">'
        + '<button class="btn-handoff" onclick="saveHandoff(this,\'' + esc(s.session_id) + '\')">handoff</button>'
        + '</span>'
        + '</div>'
        + '<div class="detail-r2">'
        + esc(truncCwd(s.cwd));

      if (s.git_branch) html += ' on <span class="branch">' + esc(s.git_branch) + '</span>';
      html += ' \u00b7 msg #' + msgCount;
      if (s.lines_added || s.lines_removed) {
        html += ' \u00b7 <span class="added">+' + (s.lines_added || 0) + '</span>/<span class="removed">-' + (s.lines_removed || 0) + '</span>';
      }
      html += '</div></div>';

      // KPI strip
      html += '<div class="kpi-strip">'
        + '<div class="kpi-box"><div class="kpi-label">Tokens</div><div class="kpi-value">'
        + (winTok ? esc(fmtTokens(ctxTok)) + ' / ' + esc(fmtTokens(winTok)) : '\u2014')
        + '</div></div>'
        + '<div class="kpi-box"><div class="kpi-label">Cost</div><div class="kpi-value">' + esc(fmtCost(s.cost_usd || 0)) + '</div></div>'
        + '<div class="kpi-box"><div class="kpi-label">Elapsed</div><div class="kpi-value">' + esc(fmtElapsed(s.age_secs || 0)) + '</div></div>'
        + '<div class="kpi-box"><div class="kpi-label">Tools/min</div><div class="kpi-value">' + esc(toolsPerMin(s)) + '</div></div>'
        + '</div>';

      // Detail body grid: tools | files | prompts
      html += '<div class="detail-body">';

      // Tool timeline section
      html += '<div class="detail-body-tools">'
        + '<div class="tl-title">Tool Timeline</div>'
        + '<div class="tl-body">';
      if (!hasFullDetail) {
        html += '<div class="empty" style="color:var(--muted)">Loading\u2026</div>';
      } else {
        const tools = [...(s.tool_uses || [])].reverse();
        if (tools.length === 0) {
          html += '<div class="empty">No tool calls yet</div>';
        } else {
          for (let ti = 0; ti < tools.length; ti++) {
            const t = tools[ti];
            const col = toolColor(t.name);
            html += '<div class="tl-entry" data-id="tl-' + ti + '">'
              + '<span class="tl-time">' + esc(fmtTime(t.timestamp)) + '</span>'
              + '<span class="tl-name" style="color:' + col + '">' + esc(t.name) + '</span>'
              + '<span class="tl-icon" style="color:' + col + '">' + toolIcon(t.name) + '</span>'
              + '<span class="tl-input" title="' + esc(t.input_summary) + '">' + esc(t.input_summary) + '</span>'
              + '</div>';
          }
        }
      }
      html += '</div></div>';

      // Files section
      html += '<div class="detail-body-files">'
        + '<div class="section-title">Files Changed</div>';
      if (!hasFullDetail) {
        html += '<div style="color:var(--muted);font-size:11px">Loading\u2026</div>';
      } else {
        const files = s.files_touched_paths || [];
        if (files.length === 0) {
          html += '<div style="color:var(--muted);font-size:11px">None</div>';
        } else {
          for (const f of files) {
            const marker = getFileMarker(s, f);
            const rel = relPath(f, s.cwd);
            html += '<div class="file-entry">'
              + '<span class="file-marker ' + (marker === 'A' ? 'file-marker-a' : 'file-marker-m') + '">' + marker + '</span>'
              + '<span class="file-path" title="' + esc(f) + '">' + esc(rel) + '</span>'
              + '</div>';
          }
        }
      }
      html += '</div>';

      // Prompts section
      html += '<div class="detail-body-prompts">'
        + '<div class="section-title">Prompts</div>';
      if (!hasFullDetail) {
        html += '<div style="color:var(--muted);font-size:11px">Loading\u2026</div>';
      } else {
        const msgs = getMessages(s);
        const lastMsgs = msgs.slice(-12);
        if (lastMsgs.length === 0) {
          html += '<div style="color:var(--muted);font-size:11px">No messages</div>';
        } else {
          for (const m of lastMsgs) {
            const cls = m.role === 'user' ? 'msg-user' : 'msg-assistant';
            const prefix = m.role === 'user' ? '\u25B8 ' : '\u25C2 ';
            const content = m.content.length > 120 ? m.content.slice(0, 117) + '\u2026' : m.content;
            html += '<div class="msg-entry ' + cls + '">'
              + '<span class="msg-prefix">' + prefix + '</span>'
              + esc(content)
              + '</div>';
          }
        }
      }
      html += '</div>';

      // Close detail body grid
      html += '</div>';

      patchDOM(contentEl, html);
    }

    function renderSessionMetrics() {
      const body = document.getElementById('metrics-body');
      const s = getSelected();

      if (!s) {
        body.innerHTML = '<div class="empty">Select a session</div>';
        return;
      }

      const tok = totalTok(s);
      const throughput = s.age_secs > 0 ? (tok / s.age_secs).toFixed(1) : '0.0';
      const spark = s.context_history ? sparkline(s.context_history, 24) : '';
      const ctxTok = s.current_context_tokens || 0;
      const winTok = s.context_window_size || 0;
      const ctxPct = Math.round(s.context_pct || 0);

      let html = '';

      // Tokens/s throughput
      html += '<div class="metric-group">'
        + '<div class="metric-label">Tokens/s</div>'
        + '<div class="metric-value">' + esc(throughput) + '<span class="unit"> tok/s</span>'
        + (spark ? '<span class="metric-spark">' + esc(spark) + '</span>' : '')
        + '</div></div>';

      // Usage (rate limits)
      html += '<div class="metric-group"><div class="metric-label">Usage</div>';
      if (s.five_hour_used_pct != null) {
        const pct5 = Math.round(s.five_hour_used_pct);
        html += '<div class="rate-row">'
          + '<span class="rate-label">5h</span>'
          + '<span class="rate-bar" style="color:' + rateLimitColor(pct5) + '">' + renderBar(pct5, 20) + '</span>'
          + '<span class="rate-pct">' + pct5 + '%</span>'
          + '</div>';
      }
      if (s.seven_day_used_pct != null) {
        const pct7 = Math.round(s.seven_day_used_pct);
        html += '<div class="rate-row">'
          + '<span class="rate-label">7d</span>'
          + '<span class="rate-bar" style="color:' + rateLimitColor(pct7) + '">' + renderBar(pct7, 20) + '</span>'
          + '<span class="rate-pct">' + pct7 + '%</span>'
          + '</div>';
      }
      if (s.five_hour_used_pct == null && s.seven_day_used_pct == null) {
        html += '<div style="color:var(--muted);font-size:11px">no live data</div>';
      }
      html += '</div>';

      // Context window
      html += '<div class="metric-group">'
        + '<div class="metric-label">Context Window</div>'
        + '<div class="ctx-detail">'
        + (winTok ? esc(fmtTokens(ctxTok)) + ' / ' + esc(fmtTokens(winTok)) + '  ' + ctxPct + '%' : '\u2014')
        + '</div>';
      if (winTok) {
        html += '<div class="ctx-full-bar" style="color:' + ctxColor(ctxPct) + '">' + renderBar(ctxPct, 30) + '</div>';
      }
      html += '</div>';

      // Session cost
      html += '<div class="metric-group">'
        + '<div class="metric-label">Session Cost</div>'
        + '<div class="metric-value">' + esc(fmtCost(s.cost_usd || 0)) + '</div>'
        + '</div>';

      // Compactions
      if ((s.compaction_count || 0) > 0) {
        html += '<div class="metric-group">'
          + '<div class="compaction-badge">' + s.compaction_count + ' compaction' + (s.compaction_count > 1 ? 's' : '') + '</div>'
          + '</div>';
      }

      // Activity log (compact)
      html += '<div class="metric-group">'
        + '<div class="metric-label">Activity</div>';
      if (!s.tool_uses) {
        html += '<div style="color:var(--muted);font-size:10px">Loading\u2026</div>';
      } else {
        const tools = [...s.tool_uses].reverse().slice(0, 20);
        if (tools.length === 0) {
          html += '<div style="color:var(--muted);font-size:10px">No activity</div>';
        } else {
          for (const t of tools) {
            html += '<div class="activity-entry">'
              + '<span class="activity-time">' + esc(fmtTime(t.timestamp)) + '</span>'
              + '<span class="activity-name" style="color:' + toolColor(t.name) + '">' + esc(t.name) + '</span>'
              + '</div>';
          }
        }
      }
      html += '</div>';

      patchDOM(body, html);
    }

    function renderHandoffs() {
      const view = document.getElementById('handoffs-view');
      if (!handoffs.length) {
        view.innerHTML = '<div class="empty">No handoffs saved</div>';
        return;
      }

      let html = '';
      for (const h of handoffs) {
        const isExpanded = expandedHandoffs.has(h.id);
        const cached = handoffCache[h.id];
        const date = h.created_at ? h.created_at.slice(0, 10) : '';

        html += '<div class="handoff-item" data-id="' + esc(h.id) + '">'
          + '<div class="handoff-header" onclick="toggleHandoff(\'' + esc(h.id) + '\')">'
          + '<div class="handoff-id">' + esc(h.id) + '</div>'
          + '<div class="handoff-meta">' + esc(fmtSize(h.size_bytes)) + (date ? ' \u00b7 ' + esc(date) : '') + '</div>'
          + (h.preview ? '<div class="handoff-preview">' + esc(h.preview) + '</div>' : '')
          + '</div>'
          + '<div class="handoff-content' + (isExpanded ? ' visible' : '') + '" id="hc-' + esc(h.id) + '">'
          + (isExpanded ? (cached ? renderMd(cached) : '<span style="color:var(--muted)">Loading\u2026</span>') : '')
          + '</div></div>';

      patchDOM(view, html);
    }

    function updateFooter() {
      const s = sessions.length;
      const h = handoffs.length;
      document.getElementById('footer-counts').textContent =
        s + ' session' + (s !== 1 ? 's' : '') + ' \u00b7 ' + h + ' handoff' + (h !== 1 ? 's' : '');
      document.getElementById('footer-updated').textContent =
        'updated ' + new Date().toLocaleTimeString();
      const upEl = document.getElementById('footer-uptime');
      if (upEl) {
        const up = serverUptime != null ? serverUptime + (Date.now() - uptimeFetchedAt) / 1000 : null;
        upEl.textContent = up != null ? 'up ' + fmtElapsed(Math.floor(up)) : '';
      }

    // ── Mobile helpers ──
    function isMobile() {
      return window.matchMedia('(max-width: 768px)').matches;
    }

    function mobileShowDetail() {
      const layout = document.getElementById('sessions-view');
      if (isMobile() && layout) layout.classList.add('mobile-detail');
    }

    function mobileBackToList() {
      const layout = document.getElementById('sessions-view');
      if (layout) layout.classList.remove('mobile-detail');
    }

    function togglePlansSidebar() {
      const sidebar = document.querySelector('.plans-sidebar');
      if (!sidebar) return;
      sidebar.classList.toggle('collapsed');
      const btn = sidebar.querySelector('.plans-sidebar-toggle');
      if (btn) btn.textContent = sidebar.classList.contains('collapsed') ? 'History \u25BC' : 'History \u25B2';
    }

    // ── Events ──
    function selectSession(id) {
      selectedId = id;
      renderSessionList();
      renderSessionDetail();
      renderSessionMetrics();
      if (id) mobileShowDetail();
      // Fetch full detail on demand if not cached
      if (id && !sessionDetailCache[id]) {
        fetchSessionDetail(id);
      }
    }

    async function fetchSessionDetail(id) {
      if (detailFetchInFlight === id) return;
      detailFetchInFlight = id;
      try {
        const res = await apiFetch('/api/sessions/' + encodeURIComponent(id));
        if (res.ok) {
          const data = await res.json();
          sessionDetailCache[id] = {
            tool_uses: data.tool_uses || [],
            files_touched_paths: data.files_touched_paths || [],
            user_messages: data.user_messages || [],
            assistant_messages: data.assistant_messages || [],
            context_history: data.context_history || [],
          };
          // Re-render if still selected
          if (selectedId === id) {
            renderSessionDetail();
            renderSessionMetrics();
          }
        }
      } catch (e) {
        console.error('fetchSessionDetail failed:', e);
      } finally {
        if (detailFetchInFlight === id) detailFetchInFlight = null;
      }
    }

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
      });
      document.getElementById('sessions-view').style.display = tab === 'sessions' ? 'grid' : 'none';
      document.getElementById('handoffs-view').style.display = tab === 'handoffs' ? 'block' : 'none';
      document.getElementById('plans-view').style.display = tab === 'plans' ? 'block' : 'none';
      if (tab === 'sessions') {
        renderSessionList();
        renderSessionDetail();
        renderSessionMetrics();
      }
      if (tab === 'handoffs') renderHandoffs();
      if (tab === 'plans') renderOrchestration(true);
    }

    async function toggleHandoff(id) {
      if (expandedHandoffs.has(id)) {
        expandedHandoffs.delete(id);
        renderHandoffs();
        return;
      }
      expandedHandoffs.add(id);
      renderHandoffs();
      if (!handoffCache[id]) {
        try {
          const res = await apiFetch('/api/handoffs/' + encodeURIComponent(id));
          if (res.ok) {
            handoffCache[id] = await res.text();
            const el = document.getElementById('hc-' + id);
            if (el) el.innerHTML = renderMd(handoffCache[id]);
          } else {
            const el = document.getElementById('hc-' + id);
            if (el) el.innerHTML = '<span style="color:var(--red)">Failed to load</span>';
          }
        } catch (_) {
          const el = document.getElementById('hc-' + id);
          if (el) el.innerHTML = '<span style="color:var(--red)">Network error</span>';
        }
      }
    }

    async function saveHandoff(btn, id) {
      btn.className = 'btn-handoff saving';
      btn.textContent = '\u2026';
      btn.disabled = true;
      try {
        const res = await apiFetch('/api/sessions/' + encodeURIComponent(id) + '/handoff', { method: 'POST' });
        if (res.ok) {
          btn.className = 'btn-handoff saved';
          btn.textContent = 'saved';
          setTimeout(() => { btn.className = 'btn-handoff'; btn.textContent = 'handoff'; btn.disabled = false; }, 2500);
        } else {
          const body = await res.json().catch(() => ({ error: res.statusText }));
          btn.className = 'btn-handoff errored';
          btn.textContent = 'error';
          btn.title = body.error || 'failed';
          setTimeout(() => { btn.className = 'btn-handoff'; btn.textContent = 'handoff'; btn.disabled = false; btn.title = ''; }, 3000);
        }
      } catch (_) {
        btn.className = 'btn-handoff errored';
        btn.textContent = 'error';
        setTimeout(() => { btn.className = 'btn-handoff'; btn.textContent = 'handoff'; btn.disabled = false; }, 3000);
      }
    }

    // ── WebSocket ──
    function setWsStatus(status) {
      document.getElementById('ws-dot').className = 'ws-dot ' + status;
      document.getElementById('ws-label').textContent =
        status === 'connected' ? 'live' :
        status === 'reconnecting' ? 'reconnecting' : 'offline';
    }

    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = proto + '//' + location.host + '/api/ws' + (_authToken ? '?token=' + encodeURIComponent(_authToken) : '');
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        setWsStatus('connected');
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      };

      ws.onclose = () => {
        setWsStatus('reconnecting');
        if (!reconnectTimer) reconnectTimer = setTimeout(() => { reconnectTimer = null; connectWs(); }, 3000);
      };

      ws.onerror = () => setWsStatus('disconnected');

      ws.onmessage = async (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch { return; }

        switch (msg.type) {
          case 'snapshot':
            sessions = msg.sessions || [];
            handoffs = msg.handoffs || [];
            if (!selectedId) autoSelect();
            render();
            if (activeTab === 'handoffs') renderHandoffs();
            break;
          case 'sessions_updated':
            sessions = msg.sessions || [];
            if (selectedId && !sessions.find(s => s.session_id === selectedId)) autoSelect();
            render();
            // Re-fetch detail for selected session if it's active (working/waiting)
            // Don't delete the cache first — keep stale data visible until fresh data arrives
            if (selectedId) {
              const sel = sessions.find(s => s.session_id === selectedId);
              if (sel && (sel.state === 'working' || sel.state === 'starting')) {
                detailFetchInFlight = null; // allow re-fetch even if one was in flight
                fetchSessionDetail(selectedId);
              }
            }
            break;
          case 'handoff_created':
            notifyHandoff(msg);
            await fetchHandoffs();
            break;
          case 'orchestration_updated': {
            if (orchDismissed) break;
            const snap = msg.orchestration || msg.snapshot || msg;
            if (!snap || !snap.plan_name) break;
            const prevState = orchestrationState ? orchestrationState.state : null;
            orchestrationState = snap;
            if (orchestrationState.state !== prevState) {
              notifyOrchStateChange(orchestrationState.state);
            }
            renderOrchestration();
            break;
          }
          case 'resync':
            sessions = msg.sessions || [];
            handoffs = msg.handoffs || [];
            if (selectedId && !sessions.find(s => s.session_id === selectedId)) autoSelect();
            render();
            if (activeTab === 'handoffs') renderHandoffs();
            break;
        }
      };
    }

    // ── HTTP ──
    async function fetchSessions() {
      try {
        const res = await apiFetch('/api/sessions');
        if (res.ok) {
          sessions = await res.json();
          if (!selectedId) autoSelect();
          render();
        } else {
          document.getElementById('session-list').innerHTML = '<div class="empty">API error: ' + res.status + '</div>';
        }
      } catch (e) {
        console.error('fetchSessions failed:', e);
        document.getElementById('session-list').innerHTML = '<div class="empty">Error: ' + esc(e.message) + '</div>';
      }
    }

    async function fetchHandoffs() {
      try {
        const res = await apiFetch('/api/handoffs');
        if (res.ok) {
          handoffs = await res.json();
          updateFooter();
          if (activeTab === 'handoffs') renderHandoffs();
        }
      } catch (e) {
        console.error('fetchHandoffs failed:', e);
      }
    }

    async function fetchVersion() {
      try {
        const data = await apiFetch('/api/health').then(r => r.json());
        document.getElementById('version').textContent = 'v' + data.version;
        serverUptime = data.uptime_secs || data.uptime || null;
        uptimeFetchedAt = Date.now();
      } catch (_) {}
    }

    // ── Orchestration ──
    function orchStateColor(state) {
      if (state === 'running')   return 'var(--green)';
      if (state === 'completed') return 'var(--green)';
      if (state === 'failed')    return 'var(--red)';
      if (state === 'aborted')   return 'var(--amber)';
      return 'var(--muted)';
    }

    function taskStatusIcon(status) {
      switch (status) {
        case 'pending':  return '\u25CC'; // ◌
        case 'blocked':  return '\u2298'; // ⊘
        case 'running':  return '\u25CF'; // ●
        case 'done':     return '\u2713'; // ✓
        case 'failed':   return '\u2717'; // ✗
        default:         return '\u25CB'; // ○
      }
    }

    let orchViewMode = null; // 'monitor' or 'launch'

    function renderOrchestration(force) {
      const view = document.getElementById('plans-view');

      // Build the two-panel layout
      let html = '<div class="plans-layout">';

      // Left sidebar: history
      html += '<div class="plans-sidebar collapsed">';
      html += '<button class="plans-sidebar-toggle" onclick="togglePlansSidebar()">History \u25BC</button>';
      html += '<div class="col-title">History</div>';
      html += '<button class="btn-new-plan" onclick="showNewPlan()">+ New Plan</button>';
      html += '<div class="plans-sidebar-body">';

      // Active orchestration at top (if any)
      const hasActive = !!(orchestrationState && orchestrationState.plan_name);
      if (hasActive) {
        const s = orchestrationState;
        const stCol = orchStateColor(s.state);
        const isSelected = !selectedHistoryId && !orchDismissed;
        html += '<div class="plan-history-item' + (isSelected ? ' selected' : '') + '" data-id="active" onclick="selectActivePlan()">'
          + '<div class="phi-name">' + esc(s.plan_name) + '</div>'
          + '<div class="phi-meta">'
          + '<span class="phi-state" style="color:' + stCol + '">' + esc(s.state) + '</span>'
          + '<span>' + fmtElapsed(s.elapsed_secs || 0) + '</span>'
          + '</div></div>';
      }

      // Historical entries (skip active plan to avoid duplicates)
      const activeName = hasActive ? orchestrationState.plan_name : null;
      for (const h of planHistory) {
        if (activeName && h.plan_name === activeName) continue;
        const isSelected = selectedHistoryId === h.id;
        const stCol = orchStateColor(h.state);
        const date = h.completed_at ? h.completed_at.slice(0, 10) : '';
        html += '<div class="plan-history-item' + (isSelected ? ' selected' : '') + '" data-id="' + esc(h.id) + '" onclick="selectHistoryPlan(\'' + esc(h.id) + '\')">'
          + '<div class="phi-name">' + esc(h.plan_name) + '</div>'
          + '<div class="phi-meta">'
          + '<span class="phi-state" style="color:' + stCol + '">' + esc(h.state) + '</span>'
          + '<span>' + esc(h.done_count + '/' + h.task_count) + '</span>'
          + '<span>' + esc(date) + '</span>'
          + '</div></div>';
      }

      if (!planHistory.length && !hasActive) {
        html += '<div class="empty" style="padding:12px;font-size:11px">No plan history</div>';
      }

      html += '</div></div>'; // close sidebar-body + sidebar

      // Right main area
      html += '<div class="plans-main">';

      if (selectedHistoryId) {
        html += '<div id="history-detail"><div class="empty">Loading\u2026</div></div>';
      } else if (hasActive && !orchDismissed) {
        html += renderOrchMonitorHtml();
      } else {
        html += renderOrchLaunchHtml();
      }

      html += '</div>'; // close main
      html += '</div>'; // close layout

      patchDOM(view, html);

      // If viewing history detail, fetch it
      if (selectedHistoryId) {
        fetchHistoryDetail(selectedHistoryId);
      }
    }

    function showNewPlan() {
      selectedHistoryId = null;
      orchDismissed = true;
      renderOrchestration(true);
    }

    function selectActivePlan() {
      selectedHistoryId = null;
      orchDismissed = false;
      renderOrchestration(true);
    }

    function selectHistoryPlan(id) {
      selectedHistoryId = id;
      renderOrchestration(true);
    }

    async function fetchHistoryDetail(id) {
      try {
        const res = await apiFetch('/api/plans/history/' + encodeURIComponent(id));
        if (res.ok) {
          const entry = await res.json();
          const container = document.getElementById('history-detail');
          if (container) {
            container.innerHTML = renderOrchMonitorHtml(entry.snapshot, true, entry);
          }
        }
      } catch (_) {}

    function projectOptions(selected) {
      let opts = '<option value=""' + (!selected || selected === '__new__' ? '' : ' selected') + '>server cwd (default)</option>';
      for (const p of projects) {
        const sel = selected === p.project_path ? ' selected' : '';
        opts += '<option value="' + esc(p.project_path) + '"' + sel + '>'
          + esc(p.project_name) + ' \u2014 ' + esc(p.project_path)
          + (p.session_count ? ' (' + p.session_count + ')' : '') + '</option>';
      }
      opts += '<option value="__new__"' + (selected === '__new__' ? ' selected' : '') + '>\u2795 New project\u2026</option>';
